<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Social Battery...</title>
  <style>
    body { font-family: sans-serif; background: #0D0D1A; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    a.btn { background: #00BCD4; color: #000; font-weight: bold; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-size: 18px; margin-top: 24px; display: inline-block; }
    p { color: #aaa; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div style="font-size:48px">🔋</div>
  <h2>Social Battery</h2>
  <a class="btn" id="openBtn" href="#">Open &amp; Add Friend</a>
  <p>Tap the button to open the app</p>
  <script>
    var code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      document.getElementById('openBtn').href = 'socialbattery://add/' + code;
    }
  </script>
</body>
</html>
